# Default values for chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: smymregistry.azurecr.io/frontend-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  BACKEND_HOST: "http://backend.local"
  HOSTNAME: "0.0.0.0"
  KEYCLOAK_CLIENT_ID: "smym-frontend-client"
  KEYCLOAK_ISSUER: "http://keycloak.local/realms/smym-dev"
  NEXTAUTH_URL: "http://frontend.local"
  NODE_ENV: "development"

envFrom:
  - secretRef:
      name: frontend-sealed-secrets

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  host: frontend.local

hostAliases: []
