# Default values for chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: smymregistry.azurecr.io/frontend
  tag: "2.0.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  HOSTNAME: '0.0.0.0'
  KEYCLOAK_CLIENT_ID: 'frontend-client'
  KEYCLOAK_ISSUER: 'http://keycloak.keycloak.svc.cluster.local:8080/realms/smym-prod'
  NEXTAUTH_URL: 'https://scottmakesyoumove.com'
  NODE_ENV: 'development'

envFrom:
  - secretRef:
      name: frontend-sealed-secrets

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-buffer-size: '128k'
    nginx.ingress.kubernetes.io/proxy-buffers-number: '4'
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
  host: scottmakesyoumove.com
  tls:
    - secretName: scottmakesyoumove-tls
      hosts:
        - scottmakesyoumove.com

hostAliases: []
