# Default values for chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: smymregistry.azurecr.io/frontend-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

envFrom:
  - configMapRef:
      name: frontend-service-config
  - secretRef:
      name: frontend-sealed-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: www.scottmakesyoumove.com
  tls:
    enabled: true
    secretName: smym-frontend-tls

backend:
  internalUrl: http://smym-backend.default.svc.cluster.local
  publicUrl: https://backend.scottmakesyoumove.com
