name: Build and deploy Frontend to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  IMAGE_NAME: frontend-service
  IMAGE_TAG: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_DATOCMS_CMA_TOKEN=${{ secrets.NEXT_DATOCMS_CMA_TOKEN }} \
            --build-arg NEXT_DATOCMS_DRAFT_CONTENT_CDA_TOKEN=${{ secrets.NEXT_DATOCMS_DRAFT_CONTENT_CDA_TOKEN }} \
            --build-arg NEXT_DATOCMS_PUBLISHED_CONTENT_CDA_TOKEN=${{ secrets.NEXT_DATOCMS_PUBLISHED_CONTENT_CDA_TOKEN }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            .

      - name: Push image to ACR
        run: docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy Frontend
        run: |
          helm upgrade --install frontend ./chart \
            --namespace default \
            --set image.repository=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --wait
