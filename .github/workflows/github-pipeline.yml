name: Build and deploy Frontend to AKS

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  IMAGE_NAME: frontend
  ENVIRONMENT: 'prod'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image_tag: ${{ steps.extract_version.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract_version
        run: |
          echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "image_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update Chart.yaml and values.yaml version
        run: |
          sed -i "s/^appVersion:.*/appVersion: \"${{ env.IMAGE_TAG }}\"/" ./chart/Chart.yaml
          sed -i "s/^  tag:.*/  tag: \"${{ env.IMAGE_TAG }}\"/" ./chart/values-${{ env.ENVIRONMENT }}.yaml

      - name: Commit version bumps
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ./chart/Chart.yaml ./chart/values-${{ env.ENVIRONMENT }}.yaml
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ env.IMAGE_TAG }}"
          git push origin HEAD:main || echo "Nothing to push"

      - name: Log in to ACR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            .

      - name: Push image to ACR
        run: docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy Frontend
        run: |
          helm upgrade --install smym-${{ env.ENVIRONMENT }}-${{ env.IMAGE_NAME }} ./chart \
            --namespace smym-${{ env.ENVIRONMENT }} \
            --create-namespace \
            -f ./chart/values-${{ env.ENVIRONMENT }}.yaml \
            --set image.repository=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --wait
